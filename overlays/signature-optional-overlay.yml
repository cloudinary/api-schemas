overlay: 1.0.0
info:
  title: Remove signature parameters
  version: 0.0.0
actions:
  # Remove signature_parameters $ref from all request body allOf arrays
  - target: '$.components.schemas.*.allOf[?(@["$ref"] == "#/components/schemas/signature_parameters")]'
    remove: true

  # Remove signature query parameter $refs from all operations
  - target: '$.paths.*.*.parameters[?(@["$ref"] == "#/components/parameters/api_key_query")]'
    remove: true
  - target: '$.paths.*.*.parameters[?(@["$ref"] == "#/components/parameters/signature_query")]'
    remove: true
  - target: '$.paths.*.*.parameters[?(@["$ref"] == "#/components/parameters/timestamp_query")]'
    remove: true

  # Remove component definitions
  - target: $.components.schemas.signature_parameters
    remove: true
  - target: $.components.parameters.api_key_query
    remove: true
  - target: $.components.parameters.signature_query
    remove: true
  - target: $.components.parameters.timestamp_query
    remove: true
