overlay: 1.0.0
info:
  title: Cloudinary signature based authentication modifications
  version: 0.0.0
actions:
  # Seed x-speakeasy-globals so schemas without one don't no-op the update below.
  # (merge update — harmless for schemas that already define it)
  - target: $
    update:
      x-speakeasy-globals:
        parameters: []
  # Drop a pre-existing cloudName-named component + its refs (media-generation variant).
  - target: $.paths.*.parameters[?(@['$ref']=='#/components/parameters/cloudName')]
    remove: true
  - target: $.components.parameters.cloudName
    remove: true
  - target: $.components
    update:
      parameters:
        cloud_name:
          name: cloud_name
          in: path
          required: true
          schema:
            type: string
          description: The cloud name of your product environment.
          x-speakeasy-globals-hidden: true
  - target: $["x-speakeasy-globals"]["parameters"]
    update:
      - $ref: "#/components/parameters/cloud_name"
  # replace each cloud_name parameter in every endpoint with the cloud_name parameter in the parameters section
  - target: $.paths.*.parameters[?(@.name=='cloud_name' && @.in=='path')]
    remove: true
  - target: $.paths.*.*.parameters[?(@.name=='cloud_name' && @.in=='path')]
    remove: true
  # remove existing $ref references to cloud_name parameter to prevent duplicates
  - target: $.paths.*.parameters[?(@['$ref']=='#/components/parameters/cloud_name')]
    remove: true
  - target: $.paths.*.*.parameters[?(@['$ref']=='#/components/parameters/cloud_name')]
    remove: true
  # add the cloud_name parameter to every path item
  - target: $.paths.*
    update:
      parameters:
        - $ref: '#/components/parameters/cloud_name'
