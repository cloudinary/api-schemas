        - condition
        - result
      example:
        metadata_field_id: smd-field-1
        name: Disable field when other field is populated
        condition:
          metadata_field_id: smd-field-2
          populated: true
        result:
          disable: true
        state: active
        position: 1
    metadata_rule_update:
      allOf:
        - $ref: '#/components/schemas/metadata_rule_base'
      example:
        metadata_field_id: smd-field-1
        name: Disable field when other field is populated
        condition:
          metadata_field_id: smd-field-2
          populated: true
        result:
          disable: true
        state: active
        position: 1
    success_response:
      type: object
      properties:
        success:
          type: boolean
          description: Whether the operation was successful.
          example: true
      required:
        - success
