    metadata_rule_apply_value:
      type: object
      description: Applies a specific value to the metadata field when the rule condition is met.
      required:
        - value
      properties:
        value:
          type:
            - string
            - 'null'
          description: The value to apply to the metadata field.
          example: my value
        mode:
          type: string
          enum:
            - default
            - override
            - append
          description: |
            How to apply the value. `default` sets it only when no value is already inferred; `override` always replaces any inferred value; `append` adds to an existing array value.
          example: default
    metadata_rule_activate_values:
      description: |
        Restricts which datasource option ids are active. Either the string "all" (activate every option) or an object listing the external ids to activate.
      oneOf:
        - type: string
          enum:
            - all
        - type: object
          required:
            - external_ids
          properties:
            external_ids:
              type:
                - array
                - 'null'
              items:
                type: string
              description: The datasource external ids to activate.
            mode:
              type: string
              enum:
                - override
                - append
              description: Whether to override the current active set or append to it. Defaults to append.
    metadata_rule_result:
      type: object
      description: The result to apply when the rule's condition is met. At least one property must be set.
      minProperties: 1
      properties:
        apply_value:
          $ref: '#/components/schemas/metadata_rule_apply_value'
        disable:
          type: boolean
          description: When true, disables the field in the UI (sets default_disabled). Preferred over the legacy enable action.
        enable:
          type: boolean
          deprecated: true
          description: When true, enables the field in the UI (clears default_disabled). Deprecated — prefer using disable with value false instead.
        hide:
          type: boolean
          description: When true, hides the field in the UI (sets hidden_ui).
        activate_values:
          $ref: '#/components/schemas/metadata_rule_activate_values'
        set_mandatory:
          type: boolean
          description: When true, makes the field mandatory; when false, makes it optional.
    metadata_rule_base:
