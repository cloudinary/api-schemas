# -----------------------------------------------------------------------

components:
  schemas:
    ProductEnvironmentRequest:
      type: object
      properties:
        name:
          type: string
          description: The display name for the product environment.
          example: Product3 Application
        cloud_name:
          type: string
          description: The Cloudinary cloud name (optional, default is auto-generated).
          example: product3
        base_sub_account_id:
          type: string
          description: The ID of another product environment to copy settings from (optional).
          example: 0aaaaa1bbbbb2ccccc3ddddd4eeeee5f
        custom_attributes:
          type: object
          description: Custom attributes associated with the product environment (optional).
      required:
        - name

    ProductEnvironmentUpdateRequest:
      type: object
      properties:
        name:
          type: string
          description: The display name for the product environment.
          example: Product3 Application
        cloud_name:
          type: string
          description: |
            The Cloudinary cloud name. An error is returned if the requested name already exists.
            **Note**: Can only be changed for accounts with fewer than 1000 images.
          example: product3
        custom_attributes:
          type: object
          description: Custom attributes associated with the product environment.
        enabled:
          type: boolean
          description: |
            Whether the product environment is enabled. **Default**: true.

    ProductEnvironmentsResponse:
      type: object
      properties:
        sub_accounts:
          type: array
          items:
            $ref: "#/components/schemas/ProductEnvironment"

    ProductEnvironment:
      description: Product Environment
      type: object
      properties:
        cloud_name:
          type: string
        name:
          type: string
          description: The cloud name of the product environment.
        enabled:
          type: boolean
          description: Whether the product environment is enabled or disabled.
        id:
          type: string
          description: The ID of the product environment.
        api_access_keys:
          type: array
          description: The list of the product environment's access keys.
          items:
            $ref: "#/components/schemas/ApiAccessKey"
        created_at:
          type: string
          format: date-time
          description: The date when the product environment was created.
        updated_at:
          type: string
          format: date-time
          description: The date when the product environment was last updated.

    AccessKeyRequest:
      type: object
      properties:
        name:
          type: string
          description: The name of the access key.
          example: "main_key"
        enabled:
          type: boolean
          description: Whether the access key is enabled or disabled.
          example: true

    AccessKeyUpdateRequest:
      type: object
      properties:
        name:
          type: string
          description: The name of the access key.
          example: "main_key"
        enabled:
          type: boolean
          description: Whether the access key is enabled or disabled.
          example: true
        dedicated_for:
          type: string
          enum:
            - webhooks
          description: |
            Designates the access key for a specific purpose while allowing it to be used for other purposes, as well.
            This action replaces any previously assigned key. **Possible values**: `webhooks`
          example: "webhooks"

    AccessKeysResponse:
      type: object
      properties:
        access_keys:
          type: array
          description: The list of the access keys.
          items:
            $ref: "#/components/schemas/AccessKey"
        total:
          type: integer
          description: Total number of the access keys.

    AccessKey:
      type: object
      properties:
        name:
          type: string
          description: The name of the access key.
        api_key:
          type: string
          description: The API key.
        api_secret:
          type: string
          format: password
          description: The API secret.
        created_at:
          type: string
          format: date-time
          description: The date when the access key was created.
        updated_at:
          type: string
          format: date-time
          description: The date when the access key was last updated.
        enabled:
          type: boolean
          description: Whether the access key is enabled or disabled.

    ApiAccessKey:
      description: Brief details of a single API Access Key.
      type: object
      properties:
        key:
          type: string
          description: The API key.
        secret:
          type: string
          format: password
          description: The API secret.
        enabled:
          type: boolean
          description: Whether the access key is enabled or disabled.

    UserRequest:
      type: object
      properties:
        name:
          type: string
          description: The user's name.
          example: John
        email:
          type: string
          description: A unique email address, which serves as the login name and notification address.
          example: john@example.com
        role:
          type: string
          description: The role to assign.
          enum:
            - master_admin
            - admin
            - billing
            - technical_admin
            - reports
            - media_library_admin
            - media_library_user
          example: technical_admin
        sub_account_ids:
          type: array
          description: |
            A list of product environment IDs that this user can access. Ignored if the role is `master_admin`.
            **Default**: all product environments.
          items:
            type: string
        enabled:
          type: boolean
          description: |
            Whether the user is enabled. **Default**: true.
          example: true

    UsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"

    User:
      description: User details.
      type: object
      properties:
        id:
          type: string
          description: The user's ID.
        name:
          type: string
          description: The user's name.
        first_name:
          type: string
          description: The user's first name.
        last_name:
          type: string
          description: The user's last name.
        role:
          type: string
          description: The user's role.
        email:
          type: string
          format: email
          description: The user's email.
        pending:
          type: boolean
          description: Whether the user is pending.
        enabled:
          type: boolean
          description: Whether the user is enabled.
        created_at:
          type: string
          format: date-time
          description: The date when the user was created.
        updated_at:
          type: string
          format: date-time
          description: The date when the user was last updated.
        last_login:
          type: string
          format: date-time
          description: The date when the user was last logged in.
        all_sub_accounts:
          type: boolean
        providers:
          type: array
          items:
            type: string
          description: The list of authentication providers for the user.
        email_preferences:
          type: object
          description: The user's email preferences.
        account_id:
          type: string
          description: The account ID.
        two_factor:
          type: boolean
          description: Whether two-factor authentication is enabled.
        status:
          type: string
          description: The user's status.
        root:
          type: boolean
          description: Whether the user is a root user.
        technical_role:
          type: string
          description: The user's technical role.
        group_count:
          type: integer
          description: The number of groups the user belongs to.
        sub_account_count:
          type: integer
          description: The number of sub-accounts the user has access to.

    UserGroupRequest:
      type: object
      properties:
        name:
          description: The user group's name.
          type: string
          example: Designers
        extended_details:
          type: boolean
          description: |
            Whether to only return extended (true) or basic information about the group (false).
            **Default**: false.
          example: false

    UserGroupsResponse:
      type: object
      properties:
        user_groups:
          description: A list of user groups.
          type: array
          items:
            $ref: '#/components/schemas/UserGroup'

    UserGroupsListResponse:
      type: object
      properties:
        groups:
          description: A list of user groups that the user belongs to.
          type: array
          items:
            $ref: '#/components/schemas/UserGroupSummary'

    UserSubAccountsResponse:
      type: object
      properties:
        sub_accounts:
          description: A list of product environments (sub-accounts) that the user has access to.
          type: array
          items:
            $ref: '#/components/schemas/SubAccountSummary'

    UserGroupUsersResponse:
      type: object
      properties:
        users:
          description: A list of user group users.
          type: array
          items:
            $ref: '#/components/schemas/UserGroupUser'

    UserGroupSummary:
      description: User group summary.
      type: object
      properties:
        id:
          type: string
          description: The user group's ID.
        name:
          type: string
          description: The user group's name.

    SubAccountSummary:
      description: Product environment (sub-account) summary.
      type: object
      properties:
        id:
          type: string
          description: The product environment's ID.
        name:
          type: string
          description: The product environment's name.
        description:
          type: string
          description: The product environment's description.
        cloud_name:
          type: string
          description: The Cloudinary cloud name of the product environment.
        enabled:
          type: boolean
          description: Whether the product environment is enabled.

    UserGroup:
      description: User group.
      type: object
      properties:
        id:
          type: string
          description: The user group's ID.
        name:
          type: string
          description: The user group's name.
        users:
          type: array
          description: |
            A list of user group users.
            Only returned in extended_details.
          items:
            $ref: '#/components/schemas/UserGroupUser'
        created_at:
          type: string
          format: date-time
          description: |
            The date when the user group was created.
            Only returned in extended_details.
        updated_at:
          type: string
          format: date-time
          description: |
            The date when the user group was last updated.
            Only returned in extended_details.

    UserGroupUser:
      type: object
      description: User group user.
      properties:
        id:
          type: string
          description: The user's ID.
        name:
          type: string
          description: The user's name.
        email:
          type: string
          format: email
          description: The user's email.

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
          example: "ok"

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
              example: "error"

    BillingUsageResponse:
      type: array
      items:
        type: object
        properties:
          plan_name:
            type: string
            description: The name of the plan (e.g., "Pro PAYG", "Advanced PAYG").
          metric_usage:
            type: array
            items:
              type: object
              properties:
                metric:
                  type: string
                  description: The type of metric being measured (e.g., "credit").
                limit:
                  type: number
                  description: The limit for this metric in the plan.
                cycles:
                  type: array
                  description: Full usage details per billing cycle (monthly or annual, depending on plan).
                  items:
                    type: object
                    properties:
                      from_day:
                        type: string
                        format: date
                        description: The start date of the billing cycle.
                        example: "2024-08-21"
                      to_day:
                        type: string
                        format: date
                        description: The end date of the billing cycle.
                        example: "2024-09-20"
                      usage:
                        type: number
                        description: Total usage for this cycle.
                        example: 25641.55
                      breakdown:
                        type: object
                        description: Usage breakdown by asset type and operation.
                        properties:
                          storage_image:
                            type: number
                            description: Storage usage for images.
                          storage_video:
                            type: number
                            description: Storage usage for videos.
                          storage_raw:
                            type: number
                            description: Storage usage for raw files.
                          transformations_image:
                            type: number
                            description: Transformation usage for images.
                          transformations_video:
                            type: number
                            description: Transformation usage for videos.
                          bandwidth_image:
                            type: number
                            description: Bandwidth usage for images.
                          bandwidth_video:
                            type: number
                            description: Bandwidth usage for videos.
                          bandwidth_raw:
                            type: number
                            description: Bandwidth usage for raw files.
                          image_impressions:
                            type: number
                            description: Number of times images were delivered (impressions).
                          video_seconds:
                            type: number
                            description: Video delivery usage measured in billing seconds (actual viewed duration multiplied
                              by a resolution-based ratio).
                        additionalProperties: false
                      product_environment_breakdown:
                        type: array
                        description: Optional breakdown by product environment. May not be present in all responses.
                        items:
                          $ref: '#/components/schemas/CloudAssetTypeBreakdown'
                monthly_cycles:
                  type: array
                  description: Monthly-level breakdown within a single annual cycle.
                  items:
                    type: object
                    properties:
                      from_day:
                        type: string
                        format: date
                        description: The start date of the monthly billing cycle.
                      to_day:
                        type: string
                        format: date
                        description: The end date of the monthly billing cycle.
                      usage:
                        type: number
                        description: Total usage for this monthly cycle.
                      breakdown:
                        type: object
                        description: Usage breakdown by asset type and operation for the monthly cycle.
                        properties:
                          storage_image:
                            type: number
                            description: Storage usage for images.
                          storage_video:
                            type: number
                            description: Storage usage for videos.
                          storage_raw:
                            type: number
                            description: Storage usage for raw files.
                          transformations_image:
                            type: number
                            description: Transformation usage for images.
                          transformations_video:
                            type: number
                            description: Transformation usage for videos.
                          bandwidth_image:
                            type: number
                            description: Bandwidth usage for images.
                          bandwidth_video:
                            type: number
                            description: Bandwidth usage for videos.
                          bandwidth_raw:
                            type: number
                            description: Bandwidth usage for raw files.
                          image_impressions:
                            type: number
                            description: Number of times images were delivered (impressions).
                          video_seconds:
                            type: number
                            description: Video delivery usage measured in billing seconds (actual viewed duration multiplied
                              by a resolution-based ratio).
                        additionalProperties: false
                      product_environment_breakdown:
                        type: array
                        description: Optional breakdown by product environment for the monthly cycle. May not be present in
                          all responses.
                        items:
                          $ref: '#/components/schemas/CloudAssetTypeBreakdown'

    CloudAssetTypeBreakdown:
      type: object
      properties:
        storage_image:
          type: number
          description: Storage usage for images in this product environment.
        storage_video:
          type: number
          description: Storage usage for videos in this product environment.
        storage_raw:
          type: number
          description: Storage usage for raw files in this product environment.
        transformations_image:
          type: number
          description: Transformation usage for images in this product environment.
        transformations_video:
          type: number
          description: Transformation usage for videos in this product environment.
        bandwidth_image:
          type: number
          description: Bandwidth usage for images in this product environment.
        bandwidth_video:
          type: number
          description: Bandwidth usage for videos in this product environment.
        bandwidth_raw:
          type: number
          description: Bandwidth usage for raw files in this product environment.
        image_impressions:
          type: number
          description: Number of times images were delivered (impressions) in this product environment.
        video_seconds:
          type: number
          description: Video delivery usage measured in billing seconds (actual viewed duration multiplied by a resolution-based
            ratio).
        cloud_name:
          type: string
          description: The name of the product environment.

    ScopeTypeEnum:
      type: string
      description: Specifies where the role/policy is applied, either at the account level or within product environments.
      enum:
        - account
        - prodenv
      example: prodenv
    # ------------------------------------
    PrincipalTypeEnum:
      type: string
      description: The type of principal.
      enum:
        - user
        - group
        - apiKey
        - provisioningKey
      example: user
    # ------------------------------------
    PermissionTypeEnum:
      type: string
      description: Specifies whether permissions apply globally or to specific content.
      enum:
        - global
        - content
      example: global
    # ------------------------------------
    ManagementTypeEnum:
      type: string
      description: Specifies whether the role's policies are managed by Cloudinary (`system`) or by the user (`custom`).
      enum:
        - system
        - custom
      example: system
    # ------------------------------------
    OperationEnum:
      type: string
      description: Specifies the operation to perform. Use `add` to associate or `remove` to disassociate.
      enum:
        - add
        - remove
      example: add
    # ------------------------------------
    ValidateCedarPolicyRequest:
      type: object
      required:
        - policy
      properties:
        policy:
          type: string
          description: The Cedar policy statement to validate.
          example: "permit(principal == Cloudinary::APIKy::\"1234\", action == Cloudinary::Action::\"read\", resource is Cloudinary::Folder
            ) when {resource.ancestor_ids.contains(\"asdfjkl12347890\")} ;"
    # ------------------------------------
    UpdateRolePrincipalsRequest:
      type: object
      properties:
        operation:
          $ref: '#/components/schemas/OperationEnum'
        principals:
          type: array
          items:
            $ref: '#/components/schemas/UpdateRolePrincipal'
    # ------------------------------------
    CustomPolicy:
      type: object
      required:
        - scope_type
        - policy_statement
        - name
      properties:
        policy_statement:
          description: A Cedar statement that permits or forbids a principal to perform an action on a resource. Refer to
            the [Permissions API guide](permissions_api_guide) for more information.

          type: string
          example: |
            permit(principal == Cloudinary::APIKey::\"1234\",action==Cloudinary::Action::\"read\",resource is Cloudinary::Folder ) when {resource.ancestor_ids.contains(\"asdfjkl12347890\")} ;
        description:
          description: A short description of the policy.
          nullable: true
          type: string
          example: "Permit read access to the Clothing folder with external ID asdfjkl12347890."
        scope_type:
          $ref: '#/components/schemas/ScopeTypeEnum'
        scope_id:
          description: >
            The ID of a specific product environment, or "all" product environments, where the policy is applied. Required
            and only relevant if scope_type is "prodenv".

            - <product_environment_id>

            - all

            *Note:* The "all" specification is relevant only when creating or updating a policy.
          type: string
          nullable: true
          example: "975l29lz02jt0836fhwi"
        name:
          description: The name assigned to the policy.
          type: string
          example: "Read access to Clothing folder"
        enabled:
          description: Indicates whether the policy is currently active. Can be "true" (enabled) or "false" (disabled).
          type: boolean
          nullable: true
          example: true
          default: true

    # ------------------------------------
    SystemRolesAndPoliciesCatalogResponse:
      type: object
      required:
        - catalog
      properties:
        catalog:
          type: object
          example:
            system_policies:
              - id: "cld::policy::global::ml::access"
                name: "Access the Media Library"
                description: "Access the Media Library within the Console. Without this permission, users can't view any assets."
                category: "Management"
                sub_category: "General operations"
                permission_type: "global"
                scope_type: "prodenv"
                policy: "permit(principal, action, resource == Cloudinary::Feature::\"cld::global::ml::access\");"
              - id: "cld::policy::content::folder::view_download"
                name: "View assets"
                description: "View all assets in the folder and its nested subfolders."
                category: "Folder"
                sub_category: "View and download"
                permission_type: "content"
                scope_type: "prodenv"
                policy: "permit(principal, action == Cloudinary::Action::\"read\", resource is Cloudinary::Asset) when { resource.ancestor_ids.contains(\"\
                  <folder_id>\") };"
            system_roles:
              - id: "cld::role::prodenv::master_admin"
                name: "Master Admin"
                description: "Fully manage product environment, including settings, product features, dashboards, and reports."
                permission_type: "global"
                scope_type: "prodenv"
                system_policy_ids:
                  - "cld::policy::global::ml::access"
                  - "cld::policy::global::folder_and_asset_management::view"
                  - "cld::policy::global::api_keys::manage"
              - id: "cld::role::folder::viewer"
                name: "Viewer"
                description: "View and download public assets."
                permission_type: "content"
                scope_type: "prodenv"
                system_policy_ids:
                  - "cld::policy::content::folder::view_download"
                  - "cld::policy::content::folder::download_public_assets"
    # ------------------------------------
    CedarSchemaResponse:
      type: object
      required:
        - schema
      properties:
        schema:
          type: object
          example:
            Cloudinary:
              actions:
                create:
                  appliesTo:
                    principalTypes: ["APIKey", "User", "Group"]
                    resourceTypes: ["Folder", "Asset", "Collection"]
                read:
                  appliesTo:
                    principalTypes: ["APIKey", "User", "Group"]
                    resourceTypes: ["Folder", "Asset", "Feature"]
                move:
                  appliesTo:
                    principalTypes: ["APIKey", "User", "Group"]
                    resourceTypes: ["Asset", "Folder"]
                    context:
                      type: "Record"
                      attributes:
                        direction:
                          type: "String"
                          required: false
              entityTypes:
                User:
                  shape:
                    type: "Record"
                    attributes:
                      root:
                        type: "Boolean"
                        required: false
                Asset:
                  shape:
                    type: "Record"
                    attributes:
                      ancestor_ids:
                        type: "Set"
                        element:
                          type: "String"
                        required: true
