    SystemPoliciesExample:
      summary: Get system policies example
      value:
        data:
          - id: "cld::policy::global::assets::moderate"
            name: "Moderate all assets"
            description: "Approve and reject all assets in moderation. To perform these actions from the Moderation page,
              pair this permission with 'Access the Moderation page'. To view assets on the page, pair it with the 'View all
              folders and assets' global permission."
            scope_type: "prodenv"
            permission_type: "global"
            policy_statement: permit(principal, action == Cloudinary::Action::"moderate", resource is Cloudinary::Asset);
            created_at: 1719475216
            updated_at: 1719475216

          - id: "cld::policy::content::folder::view_download"
            name: "View all assets"
            description: "View all assets in the folder and its nested subfolders."
            scope_type: "prodenv"
            permission_type: "content"
            policy_statement: |
              permit(principal, action == Cloudinary::Action::"read", resource is Cloudinary::Folder) when { resource.ancestor_ids.contains("<folder_id>") };
              permit(principal, action == Cloudinary::Action::"read", resource is Cloudinary::Asset) when { resource.ancestor_ids.contains("<folder_id>") };
            policy_parameters: ["folder_id"]
            created_at: 1719475216
            updated_at: 1719475216
        next_cursor: "3"

