      schema:
        $ref: '#/components/schemas/PermissionTypeEnum'
    # ------------------------------------
    ManagementTypeParam:
      name: management_type
      description: Specifies whether the role's policies are managed by Cloudinary (`system`) or by the user (`custom`).
      in: query
      schema:
        $ref: '#/components/schemas/ManagementTypeEnum'
    # ------------------------------------
    ForceDeleteParam:
      name: force
      description: >
        Determines whether the role should be deleted when it has associated principals.

        - `true`: Deletes the role even if it has associated principals.

        - `false` (default): Prevents deletion if the role has associated principals. You must manually unassociate the principals
        before deleting the role.
      in: query
      schema:
        type: boolean
    # ------------------------------------
    RoleIdParam:
      name: role_id
      description: A unique identifier for the role.
      in: path
      required: true
      schema:
        type: string
    # -----------------------------------------------------------------------
    VerboseParam:
      name: verbose
      description: Determines whether the response contains all the parameters described below (`true`), or only `id` and
        `principal_type` (`false`). *Default:* `false`
      in: query
      schema:
        type: boolean
    # ------------------------------------

