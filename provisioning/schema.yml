      name: scope_id
      description: >
        The ID of a specific product environment where the policy is applied. This parameter is only relevant if `scope_type`
        is "prodenv".

        - <product_environment_id>

      in: query
      required: false
      schema:
        type: string
    # ------------------------------------
    PolicyParameterKeyParam:
      name: param_key
      description: The type of content instance the role applies to, either `folder_id` or `collection_id`. Use together with
        `param_value` to retrieve role assignments as they apply to a specific instance.
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
        example:
          - "folder_id"
    # ------------------------------------
    PolicyParameterValueParam:
      name: param_value
      description: The ID of the content instance (for example, a specific folder or collection). Use together with param_key
        to retrieve roles as they apply to a specific instance.
      in: query
      required: false
      schema:
        type: array
        items:
          type: string
        example:
          - "asdfjkl12347890"
    # ------------------------------------
    FolderId:
      name: folder_id
      description: >
        * In the **Get role** endpoint, the specified `folder_id` is included in the `policy_statement` parameter of the response.
        If no `folder_id` is specified, the `policy_statement` shows a placeholder for the `folder_id` where relevant.

        * In the **Get a principal's roles**, **Get a role's principals**, and **Inspect** endpoints, the results are filtered
        by the specified `folder_id`. Only roles or principals with `policy_statement` parameters associated with that `folder_id`
        are returned.
      in: query
      schema:
        type: string
    # ------------------------------------
    AssetId:
      name: asset_id
      description: Not currently supported.
      in: query
      schema:
        type: string
    # ------------------------------------
    CollectionId:
      name: collection_id
      description: >
        * In the **Get role** endpoint, the specified `collection_id` is included in the `policy_statement` parameter of the
        response. If no `collection_id` is specified, the `policy_statement` shows a placeholder for the `collection_id` where
        relevant.

        * In the **Get a principal's roles** and **Get a role's principals** endpoints, the results are filtered by the specified
        `collection_id`. Only roles or principals with `policy_statement` parameters associated with that `collection_id`
        are returned.
      in: query
      schema:
        type: string
