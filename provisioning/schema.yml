  /v2/accounts/{account_id}/permissions/principal_roles/inspect:
    parameters:
      - $ref: '#/components/parameters/AccountIdParam'
    get:
      # --------
      #  Inspect
      # ------------------------------------
      summary: Inspect
      x-speakeasy-mcp:
        name: inspect-principals
        scopes:
          - admin
        title: Inspect Principals
        readOnlyHint: true
        idempotentHint: true
      description: |
        Retrieves principals and their assigned roles within a specified scope, based on query filters.

        Use this endpoint to determine which users, groups, API keys, or account API keys have roles applied at:
        * A specific `scope_type` ("account" or "prodenv")
        * A specific `scope_id` (for product environments)
        * Optional content filters (such as `folder_id`, `collection_id`, or `param_key` / `param_value`)
        * Optional `principal_type` (and `principal_id`)

        The response includes all principals that match the specified filters, along with the roles applied to them within that context.

        This endpoint is useful when you want to:
        * Audit who has access within a given scope
        * Identify all principals assigned to roles for a specific folder, collection, asset, or product environment
        * Retrieve role assignments dynamically based on filtering criteria
      operationId: inspect
      tags:
        - Principals
      parameters:
        - $ref: '#/components/parameters/ScopeTypeRequiredParam'
        - $ref: '#/components/parameters/ScopeIdParam'
        - $ref: '#/components/parameters/PrincipalTypeParam'
        - $ref: '#/components/parameters/PrincipalIdParam'
        - $ref: '#/components/parameters/FolderId'
        - $ref: '#/components/parameters/AssetId'
        - $ref: '#/components/parameters/CollectionId'
        - $ref: '#/components/parameters/PolicyParameterKeyParam'
        - $ref: '#/components/parameters/PolicyParameterValueParam'
        - $ref: '#/components/parameters/CursorParam'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrincipalRolesInspectResponse'
              examples:
                InspectExampleFolder:
                  $ref: '#/components/examples/InspectExampleFolder'
                InspectExampleAllFolders:
                  $ref: '#/components/examples/InspectExampleAllFolders'
                InspectExampleProdEnv:
                  $ref: '#/components/examples/InspectExampleProdEnv'
        '400':
          description: Missing fields, invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionsErrorResponse"
        '401':
          description: Authorization required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionsErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionsErrorResponse"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionsErrorResponse'
    post:
      # --------
      #  Inspect multiple
      # ------------------------------------
      x-speakeasy-mcp:
        name: inspect-principals-multiple
        scopes:
          - admin
        title: Inspect Multiple Principals
        readOnlyHint: true
        idempotentHint: true
      summary: Inspect multiple
      description: |
        Retrieves role assignments for a specified list of principals within a shared scope and optional policy parameters.

        Use this endpoint when you already know which principals you want to evaluate and want to check their role assignments in a single request.

        In this request:
        * You explicitly provide the `principals` array in the request body.
        * All principals are evaluated against the same `scope_type`, optional `scope_id`, and optional `policy_parameters`.
        * Unlike `Inspect`, this endpoint doesn't search for matching principals. It evaluates only the principals you provide.

        This endpoint is useful for:
        * Verify role assignments for multiple specified principals at once
        * Comparing role assignments across specific users, groups, or keys
        * Reducing multiple per-principal `Inspect` calls into a single request
      operationId: inspectMultiple
      tags:
        - Principals
      requestBody:
        description: Role assignments for multiple principals.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InspectRequest'
            examples:
              InspectMultipleRequestExample:
                $ref: '#/components/examples/InspectMultipleRequestExample'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrincipalRolesInspectResponse'
              examples:
                InspectMultipleResponseExample:
                  $ref: '#/components/examples/InspectMultipleResponseExample'
        '400':
          description: Missing fields, invalid fields
          content:
